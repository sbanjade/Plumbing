<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlumberAter Admin | Service Requests</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <header class="site-header">
    <div class="container nav-shell">
      <a href="index.html" class="brand">
        <img src="assets/logo.png" alt="PlumberAter Plumbing logo" class="brand-logo" />
        <span class="brand-text">PlumberAter Admin</span>
      </a>
      <a href="index.html" class="phone-btn">Back To Site</a>
    </div>
  </header>

  <main class="section">
    <div class="container admin-shell">
      <div class="section-heading">
        <p class="eyebrow">Client View</p>
        <h1 class="admin-title">Submitted Service Requests</h1>
        <p class="admin-subtitle">
          Open this page to check who submitted the form and what plumbing help they asked for.
        </p>
      </div>

      <div class="admin-toolbar">
        <button id="refreshBtn" class="btn btn-primary" type="button">Refresh Requests</button>
        <p id="adminStatus" class="form-status" aria-live="polite"></p>
      </div>

      <section id="requestList" class="request-list"></section>
    </div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
